services:
  - type: web
    name: chess-elo-coach-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: heuristic
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-domain.vercel.app
      - key: FRONTEND_ORIGIN_REGEX
        value: https?://(localhost|127\.0\.0\.1)(:\d+)?|https://.*\.vercel\.app
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: RATE_LIMIT_PER_WINDOW
        value: 45
