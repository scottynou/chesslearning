services:
  - type: web
    name: chess-elo-coach-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: heuristic
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_ORIGIN
        value: https://chess-elo-coach-web.onrender.com
      - key: FRONTEND_ORIGIN_REGEX
        value: https?://(localhost|127\.0\.0\.1)(:\d+)?|https://.*\.(onrender\.com|web\.app|firebaseapp\.com)
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: RATE_LIMIT_PER_WINDOW
        value: 45
  - type: web
    name: chess-elo-coach-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build:live-server
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: chess-elo-coach-api
          envVarKey: RENDER_EXTERNAL_URL
