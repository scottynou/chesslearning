services:
  - type: web
    name: chess-elo-coach-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: heuristic
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_ORIGIN
        value: https://your-vercel-domain.vercel.app
